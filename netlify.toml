# netlify.toml
# Konfiguration fuer das Hosting der Kita-Website bei Netlify.
# Diese Datei gehoert ins WURZELVERZEICHNIS des Repos (neben package.json).
# Nach dem Hinzufuegen: committen + nach main pushen -> Netlify uebernimmt sie automatisch.

# --- Build-Einstellungen (schadet nicht, macht den Build eindeutig) ---
[build]
  command = "npm run build"
  publish = "dist"

# --- Sicherheits-Header fuer ALLE Seiten ---
# Diese Header gelten fuer jede ausgelieferte Datei ("/*").
[[headers]]
  for = "/*"
  [headers.values]
    # Content-Security-Policy: legt fest, aus welchen Quellen Inhalte geladen
    # werden duerfen. Da die Seite alles lokal laedt (keine externen Fonts,
    # Skripte oder Tracker), ist die Regel eng gefasst.
    # Hinweis: 'unsafe-inline' ist hier bewusst gesetzt, weil Astro ein winziges
    # Inline-Skript (Mobil-Menue) und Inline-Styles erzeugt. Bei einer Seite
    # ohne Nutzer-Eingaben ist das Risiko sehr gering. Wer es strenger will,
    # kann spaeter auf Hash-/Nonce-basierte CSP umstellen.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

    # Erzwingt HTTPS fuer zukuenftige Aufrufe (2 Jahre).
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

    # Verhindert, dass die Seite in fremde Frames eingebettet wird (Clickjacking).
    X-Frame-Options = "DENY"

    # Verhindert, dass der Browser Dateitypen "erraet" (MIME-Sniffing).
    X-Content-Type-Options = "nosniff"

    # Gibt beim Verlassen der Seite moeglichst wenig Herkunftsdaten preis.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Schaltet nicht benoetigte Browser-Funktionen ab.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"

    # Zusaetzliche Isolierung des Browser-Kontexts.
    Cross-Origin-Opener-Policy = "same-origin"
